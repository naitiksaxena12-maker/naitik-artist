<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Naitik Artist | 3D Interactive Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #f3f4f6; }
        
                /* Realistic watercolor textured canvas paper backdrop */
        .canvas-texture-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('canvas-bg.jpg'); /* Make sure this matches your filename exactly */
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* Signature placement frame */
        .sig-container {
            position: absolute;
            top: 20px; left: 20px;
            width: 180px; height: 90px;
            pointer-events: auto;
            transition: all 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Animated neon lines following your signature geometry */
        .sig-line {
            width: 100%; height: 100%;
            stroke: #ffcc00; stroke-width: 4; stroke-linecap: round; fill: none;
            filter: drop-shadow(0 0 6px rgba(255, 204, 0, 0.9)) drop-shadow(0 0 15px rgba(234, 179, 8, 0.5));
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: writeSig 3s ease-in-out FORWARDS;
        }

        @keyframes writeSig { to { stroke-dashoffset: 0; } }
           /* Styles your real signature with an intense golden neon aura */
        .real-sig-glow {
            width: 100%;
            height: auto;
            filter: brightness(1.3) sepia(1) hue-rotate(5deg) saturate(6)
                    drop-shadow(0px 0px 6px rgba(255, 215, 0, 0.9)) 
                    drop-shadow(0px 0px 15px rgba(234, 179, 8, 0.5));
            animation: fadeInGlow 2.5s ease-in-out forwards;
        }

        @keyframes fadeInGlow {
            0% { opacity: 0; filter: brightness(1) drop-shadow(0 0 0 transparent); }
            100% { opacity: 1; }
        }
 </style>
</head>
<body>

        <div class="ui-layer">
        <div class="sig-container">
            <img src="signature.jpg" alt="Naitik Signature" class="real-sig-glow">
        </div>
    </div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const canvas = document.getElementById('3d-viewport');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 6;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setClearColor(0x000000, 0); // Force 3D layer to be 100% transparent

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        // Dynamic light system cast by your glowing signature logo
        const neonLight = new THREE.DirectionalLight('#ffcc00', 1.8);
        neonLight.position.set(-3, 3, 3);
        neonLight.castShadow = true;
        scene.add(neonLight);
        scene.add(new THREE.AmbientLight('#ffffff', 0.8));

        // Creating hyper-realistic PBR style procedural wood textures 
        const generateWood = () => {
            const c = document.createElement('canvas'); c.width = 256; c.height = 256;
            const ctx = c.getContext('2d'); ctx.fillStyle = '#a16207'; ctx.fillRect(0,0,256,256);
            for(let i=0; i<150; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#78350f' : '#854d0e';
                ctx.fillRect(Math.random()*256, 0, Math.random()*2+1, 256);
            }
            return new THREE.CanvasTexture(c);
        };

        // Building the 3D realistic studio palette
        const paletteGeo = new THREE.BoxGeometry(2.8, 2, 0.08);
        const paletteMat = new THREE.MeshStandardMaterial({ map: generateWood(), roughness: 0.5, metalness: 0.1 });
        const paletteMesh = new THREE.Mesh(paletteGeo, paletteMat);
        paletteMesh.castShadow = true; paletteMesh.receiveShadow = true;
        
        // Move it down for comfortable thumb dragging space on mobile screens
        paletteMesh.position.set(0, -0.6, 0);
        scene.add(paletteMesh);

        // Add 3D high-gloss wet paint drops
        const paintColors = ['#e11d48', '#2563eb', '#9333ea'];
        paintColors.forEach((col, i) => {
            const drop = new THREE.Mesh(
                new THREE.CylinderGeometry(0.2, 0.25, 0.03, 16),
                new THREE.MeshStandardMaterial({ color: col, roughness: 0.01, metalness: 0.0 })
            );
            drop.position.set(-0.6 + (i*0.6), -0.6, 0.05);
            drop.rotation.x = Math.PI / 2;
            scene.add(drop);
        });

        // Touch interaction drivers
        let drag = false;
        window.addEventListener('touchstart', () => drag = true);
        window.addEventListener('touchend', () => drag = false);
        window.addEventListener('touchmove', (e) => {
            if(drag) {
                let t = e.touches[0];
                paletteMesh.rotation.y = (t.clientX / window.innerWidth - 0.5) * 2;
                paletteMesh.rotation.x = (t.clientY / window.innerHeight - 0.5) * 2;
            }
        });

        function loop() {
            requestAnimationFrame(loop);
            if(!drag) {
                paletteMesh.rotation.y = Math.sin(Date.now() * 0.001) * 0.15;
            }
            renderer.render(scene, camera);
        }
        loop();
    </script>
</body>
</html>
